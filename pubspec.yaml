name: translate_reader
description: "Приложение-читалка с переводом"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  translator: ^1.0.4+1
  epubx: ^4.0.0
  xml: ^6.6.1
  archive: ^3.6.1
  flutter_svg: ^2.2.3
  google_fonts: ^8.0.2
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.4
  http: ^1.3.0

dev_dependencies:
  flutter_lints: ^5.0.0
  drift_dev: ^2.25.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.9.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
